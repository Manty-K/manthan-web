  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas#shaderCanvas {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
    }
    #root { position: relative; z-index: 1; }
    #root, #root > * { background: transparent !important; }
    .ap-card { background: rgba(0,0,0,0.5) !important; backdrop-filter: blur(16px); }

  <script>
    // Block the hardcoded /audio/ paths baked into the compiled player
    // Also set crossOrigin="anonymous" for any http(s) src so Web Audio API can process it
    (function () {
      const desc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src');
      Object.defineProperty(HTMLMediaElement.prototype, 'src', {
        set(v) {
          if (v && !v.startsWith('blob:') && !v.startsWith('http') && v.includes('/audio/')) return;
          desc.set.call(this, v);
        },
        get() { return desc.get.call(this); }
      });
    })();
  </script>
  <script>
    const _OrigAC = window.AudioContext || window.webkitAudioContext;
    let _shCtx = null, _shSrc = null, _capturedEl = null;

    // Step 1 — runs without user gesture: ensures audio element has crossOrigin='anonymous'
    // so the browser fetches it with CORS headers (required for Web Audio API processing).
    // Calls el.load() to re-fetch with CORS if not already set.
    function ensureCORSAudio() {
      const el = document.querySelector('audio');
      if (!el || !el.src.startsWith('http')) return false;
      if (el.crossOrigin !== 'anonymous') {
        el.crossOrigin = 'anonymous';
        el.load(); // re-fetch with CORS headers
      }
      return true;
    }
    // Poll until the React-rendered audio element appears, then set CORS and stop
    const _corsSetup = setInterval(() => {
      if (ensureCORSAudio()) clearInterval(_corsSetup);
    }, 100);

    // Step 2 — runs inside a user gesture (click): creates AudioContext and wires up analyser
    function tryCapture() {
      const el = document.querySelector('audio');
      if (!el) return;

      if (el === _capturedEl) {
        // Same element — MediaElementSource already follows src changes automatically.
        // Just update tracked src and ensure context is running.
        _capturedEl.__src = el.src;
        if (_shCtx && _shCtx.state === 'suspended') _shCtx.resume();
        return;
      }

      // New element — for http(s) URLs, wait until CORS is set up.
      // blob: URLs are same-origin, no CORS needed.
      if (el.src.startsWith('http') && el.crossOrigin !== 'anonymous') return;

      try {
        if (!_shCtx) _shCtx = new _OrigAC();
        if (_shCtx.state === 'suspended') _shCtx.resume();
        if (_shSrc) { try { _shSrc.disconnect(); } catch(e) {} _shSrc = null; }
        const an = _shCtx.createAnalyser();
        an.fftSize = 512;
        an.smoothingTimeConstant = 0.8;
        _shSrc = _shCtx.createMediaElementSource(el);
        _shSrc.connect(an);
        _shSrc.connect(_shCtx.destination);
        window.__shaderAnalyser = an;
        _capturedEl = el;
        _capturedEl.__src = el.src;
      } catch(e) { console.error('capture failed:', e.message); }
    }

    // AudioContext must be created/resumed inside a user gesture
    document.addEventListener('click', () => {
      if (_shCtx && _shCtx.state === 'suspended') _shCtx.resume();
      setTimeout(tryCapture, 150);
    });

    // Re-capture if audio element is replaced after a file upload
    setInterval(() => { if (_shCtx) tryCapture(); }, 600);
  </script>

<body>
  <canvas id="shaderCanvas"></canvas>
  <div id="root"></div>

  <script>
  (function() {
    const canvas = document.getElementById('shaderCanvas');
    const gl = canvas.getContext('webgl2');
    if (!gl) return;

    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    const vbo = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function link(v, f) {
      const p = gl.createProgram();
      gl.attachShader(p, compile(gl.VERTEX_SHADER, v));
      gl.attachShader(p, compile(gl.FRAGMENT_SHADER, f));
      gl.linkProgram(p); return p;
    }

    const VERT = `#version 300 es
layout(location=0) in vec2 a;
void main(){ gl_Position=vec4(a,0,1); }`;

    const BUFFER_FRAG = `#version 300 es
precision highp float;
uniform vec3 iResolution;
uniform sampler2D iChannel0, iChannel1;
out vec4 O;
void main(){
  vec2 I=gl_FragCoord.xy, r=iResolution.xy;
  I.y -= r.y/500.0;
  O = I.y>1.0 ? texture(iChannel0,I/r) : texture(iChannel1,I/r);
}`;

    const IMAGE_FRAG = `#version 300 es
precision highp float;
uniform vec3  iResolution;
uniform float iTime;
uniform sampler2D iChannel0;
out vec4 outColor;
void main(){
  vec2 I=gl_FragCoord.xy;
  vec4 O=vec4(0);
  float i=0.,d=0.,z=0.,r=0.;
  for(;i++<90.;O+=(cos(z*.5+iTime*.6+vec4(0,2,4,3))+1.3)/d/z){
    vec3 R=iResolution.xyy,p=z*normalize(vec3(I+I,0.)-R*1.1);
    p+=1.0; r=max(-p,0.).y;
    p.y+=r+r-4.*texture(iChannel0,vec2((p.x+6.5)/15.,(-p.z-3.)*50./R.y)).r;
    float s=p.z+3.;
    z+=d=.1*(.1*r+abs(p.y)/(1.+r+r+r*r)+max(s,-d*.1));
  }
  outColor=tanh(O/9e2);
}`;

    const bufProg = link(VERT, BUFFER_FRAG);
    const imgProg = link(VERT, IMAGE_FRAG);
    const bU = {
      res: gl.getUniformLocation(bufProg,'iResolution'),
      ch0: gl.getUniformLocation(bufProg,'iChannel0'),
      ch1: gl.getUniformLocation(bufProg,'iChannel1'),
    };
    const iU = {
      res:  gl.getUniformLocation(imgProg,'iResolution'),
      time: gl.getUniformLocation(imgProg,'iTime'),
      ch0:  gl.getUniformLocation(imgProg,'iChannel0'),
    };

    const FFT_SIZE = 512;
    const audioTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, audioTex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,FFT_SIZE/2,1,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,new Uint8Array(FFT_SIZE/2));
    const freqData = new Uint8Array(FFT_SIZE/2);

    let fboA,fboB,texA,texB,fboW=0,fboH=0;
    function makeTex(w,h){
      const t=gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D,t);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      return t;
    }
    function makeFbo(t){
      const f=gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER,f);
      gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
      return f;
    }
    function ensureFbos(w,h){
      if(w===fboW&&h===fboH)return;
      if(fboA){gl.deleteFramebuffer(fboA);gl.deleteTexture(texA);}
      if(fboB){gl.deleteFramebuffer(fboB);gl.deleteTexture(texB);}
      fboW=w; fboH=h;
      texA=makeTex(w,h); texB=makeTex(w,h);
      fboA=makeFbo(texA); fboB=makeFbo(texB);
      gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    }

    function resize(){
      const dpr=Math.min(devicePixelRatio,1.5);
      canvas.width=window.innerWidth*dpr;
      canvas.height=window.innerHeight*dpr;
      ensureFbos(canvas.width,canvas.height);
    }
    window.addEventListener('resize',resize);
    resize();

    const t0=performance.now();
    let ping=true;
    function frame(){
      requestAnimationFrame(frame);
      const w=canvas.width, h=canvas.height;
      const an=window.__shaderAnalyser;
      if(an){
        an.getByteFrequencyData(freqData);
        gl.bindTexture(gl.TEXTURE_2D,audioTex);
        gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,freqData.length,1,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,freqData);
      }
      gl.bindVertexArray(vao);
      gl.bindFramebuffer(gl.FRAMEBUFFER,ping?fboA:fboB);
      gl.viewport(0,0,w,h); gl.useProgram(bufProg);
      gl.uniform3f(bU.res,w,h,1);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,ping?texB:texA); gl.uniform1i(bU.ch0,0);
      gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,audioTex); gl.uniform1i(bU.ch1,1);
      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
      gl.bindFramebuffer(gl.FRAMEBUFFER,null);
      gl.viewport(0,0,w,h); gl.useProgram(imgProg);
      gl.uniform3f(iU.res,w,h,1);
      gl.uniform1f(iU.time,(performance.now()-t0)/1000);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,ping?texA:texB); gl.uniform1i(iU.ch0,0);
      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
      ping=!ping;
    }
    frame();
  })();
  </script>

  <script>
  /* Drive .ap-waveform spans from real FFT data */
  (function () {
    // Disable the CSS wave animation so inline heights take over
    const s = document.createElement('style');
    s.textContent = '.ap-waveform--playing span { animation: none !important; }';
    document.head.appendChild(s);

    const MIN_H = 4, MAX_H = 28; // px

    function driveWaveform() {
      requestAnimationFrame(driveWaveform);
      const an = window.__shaderAnalyser;
      if (!an) return;

      const spans = document.querySelectorAll('.ap-waveform span');
      if (!spans.length) return;

      const buf = new Uint8Array(an.frequencyBinCount);
      an.getByteFrequencyData(buf);

      const n = spans.length;
      // Use lower 40% of bins — covers the musical/beat range
      const range = Math.floor(buf.length * 0.4);
      for (let i = 0; i < n; i++) {
        const idx = Math.round((i / n) * range);
        const val = buf[idx] / 255;
        spans[i].style.height = (MIN_H + val * (MAX_H - MIN_H)) + 'px';
      }
    }

    driveWaveform();
  })();
  </script>
